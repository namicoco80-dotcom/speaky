<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ SPEAKY</title>
<!-- PWA -->
<link rel="manifest" href="./assets/manifest-BmhQutSS.json">
<meta name="theme-color" content="#FF8C00">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root {
    --orange: #FF8C00;
    --orange-light: #FFB347;
    --orange-dark: #E07800;
    --purple: #7C4DFF;
    --purple-light: #B388FF;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --text: #2D1B00;
    --text-muted: #A0876A;
    --shadow-orange: 0 8px 24px rgba(255,140,0,0.35);
    --shadow-card: 0 4px 20px rgba(45,27,0,0.10);
    --shadow-3d: 0 6px 0 #E07800, 0 8px 16px rgba(255,140,0,0.3);
    --shadow-purple-3d: 0 6px 0 #5533CC, 0 8px 16px rgba(124,77,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,179,71,0.18) 0%, transparent 40%),
      radial-gradient(circle at 85% 70%, rgba(124,77,255,0.12) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    position: relative; z-index: 10;
    padding: 52px 20px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Baloo 2', cursive;
    font-size: 30px; font-weight: 800;
    color: var(--orange);
    letter-spacing: -0.5px;
    text-shadow: 0 3px 0 var(--orange-dark);
    display: flex; align-items: center; gap: 6px;
  }
  .logo .bolt {
    font-size: 26px;
    filter: drop-shadow(0 2px 4px rgba(255,140,0,0.5));
    animation: boltPulse 2s ease-in-out infinite;
  }
  @keyframes boltPulse {
    0%,100% { transform: scale(1) rotate(-5deg); }
    50%      { transform: scale(1.15) rotate(5deg); }
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .streak-badge {
    background: linear-gradient(135deg, #FF6B35, #FF8C00);
    color: white; font-weight: 800; font-size: 13px;
    padding: 6px 12px; border-radius: 20px;
    box-shadow: 0 3px 0 #CC5500, 0 4px 12px rgba(255,107,53,0.4);
    display: flex; align-items: center; gap: 4px;
  }
  .settings-btn {
    width: 38px; height: 38px;
    background: white; border: none; border-radius: 12px;
    box-shadow: var(--shadow-card); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
  }
  .settings-btn:active { transform: scale(0.92); }

  /* ─── SUBTITLE ─── */
  .subtitle-area { position: relative; z-index: 10; padding: 10px 22px 0; }
  .subtitle-area p { font-size: 14px; color: var(--text-muted); font-weight: 600; }

  /* ─── TODAY EXPRESSION ─── */
  .today-card {
    position: relative; z-index: 10;
    margin: 18px 20px 0;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 22px; padding: 20px 22px;
    box-shadow: var(--shadow-3d);
    overflow: hidden; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: slideUp 0.5s ease both;
  }
  .today-card:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #E07800, 0 4px 8px rgba(255,140,0,0.25);
  }
  .today-card::before {
    content: '✨ 오늘의 표현';
    position: absolute; top: 14px; right: 18px;
    font-size: 11px; font-weight: 800;
    color: rgba(255,255,255,0.75); letter-spacing: 0.5px;
  }
  .today-card::after {
    content: '';
    position: absolute; bottom: -30px; right: -20px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.12); border-radius: 50%;
  }
  .today-en {
    font-family: 'Baloo 2', cursive;
    font-size: 20px; font-weight: 700;
    color: white; line-height: 1.3; margin-top: 4px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .today-kr {
    font-size: 13px; color: rgba(255,255,255,0.85);
    margin-top: 6px; font-weight: 600;
  }
  .today-play {
    position: absolute; bottom: 16px; right: 20px;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.25); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; backdrop-filter: blur(4px); z-index: 2;
  }

  /* ─── STATS ─── */
  .stats-row {
    position: relative; z-index: 10;
    display: flex; gap: 10px;
    margin: 14px 20px 0;
    animation: slideUp 0.5s 0.1s ease both;
  }
  .stat-card {
    flex: 1; background: var(--card);
    border-radius: 16px; padding: 14px 12px;
    box-shadow: var(--shadow-card); text-align: center;
    border: 2px solid transparent; transition: transform 0.15s;
  }
  .stat-card:active { transform: scale(0.95); }
  .stat-num {
    font-family: 'Baloo 2', cursive;
    font-size: 24px; font-weight: 800; color: var(--orange); line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-top: 3px; }
  .stat-card.progress {
    flex: 1.4; display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start; padding: 14px 16px;
  }
  .stat-card.progress .stat-label { text-align: left; margin-bottom: 8px; }
  .progress-bar-wrap {
    width: 100%; height: 8px; background: #FFE4C0;
    border-radius: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 8px; transition: width 0.8s ease;
  }
  .progress-pct { font-size: 13px; font-weight: 800; color: var(--orange); margin-top: 4px; }

  /* ─── SECTION TITLE ─── */
  .section-title {
    position: relative; z-index: 10;
    padding: 22px 22px 0;
    font-family: 'Baloo 2', cursive;
    font-size: 18px; font-weight: 800; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }

  /* ─── FOLDER CHIPS ─── */
  .folder-scroll {
    position: relative; z-index: 10;
    display: flex; gap: 8px;
    padding: 10px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .folder-scroll::-webkit-scrollbar { display: none; }
  .folder-chip {
    flex-shrink: 0; background: var(--card);
    border: 2px solid #F0E0CC; border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-weight: 700;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .folder-chip.active {
    background: var(--orange); border-color: var(--orange);
    color: white; box-shadow: 0 3px 0 var(--orange-dark);
  }

  /* ─── MENU GRID ─── */
  .menu-grid {
    position: relative; z-index: 10;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin: 12px 20px 0;
    animation: slideUp 0.5s 0.2s ease both;
  }
  .menu-btn {
    background: var(--card); border: none; border-radius: 20px;
    padding: 20px 16px; text-align: left; cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden;
  }
  .menu-btn:active { transform: translateY(3px); box-shadow: 0 1px 8px rgba(45,27,0,0.08); }
  .menu-btn .menu-icon { font-size: 32px; display: block; margin-bottom: 10px; }
  .menu-btn .menu-name {
    font-family: 'Baloo 2', cursive; font-size: 15px;
    font-weight: 800; color: var(--text); display: block; line-height: 1.2;
  }
  .menu-btn .menu-desc { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 3px; display: block; }
  .menu-btn .menu-count {
    position: absolute; top: 14px; right: 14px;
    font-size: 11px; font-weight: 800;
    padding: 3px 8px; border-radius: 10px;
    background: #FFF0DC; color: var(--orange);
  }
  .menu-btn.quiz  { border-top: 3px solid var(--purple); }
  .menu-btn.vocab { border-top: 3px solid #00C07A; }
  .menu-btn.add   { border-top: 3px solid var(--orange); }
  .menu-btn.youtube { border-top: 3px solid #FF4757; }

  /* ─── QUIZ CHIPS ─── */
  .quiz-scroll {
    position: relative; z-index: 10;
    display: flex; gap: 10px;
    padding: 12px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .quiz-scroll::-webkit-scrollbar { display: none; }
  .quiz-chip {
    flex-shrink: 0;
    background: var(--card); border: 2px solid #F0E0CC;
    border-radius: 16px; padding: 12px 16px;
    cursor: pointer; text-align: center;
    transition: all 0.15s; min-width: 72px;
  }
  .quiz-chip.active {
    background: var(--purple); border-color: var(--purple);
    box-shadow: 0 4px 0 #5533CC;
  }
  .chip-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .chip-name {
    font-size: 11px; font-weight: 800; color: var(--text-muted); line-height: 1.3;
  }
  .quiz-chip.active .chip-name { color: white; }

  /* ─── START BUTTON ─── */
  .start-area { position: relative; z-index: 10; padding: 16px 20px 0; }
  .start-btn {
    width: 100%; padding: 18px;
    font-family: 'Baloo 2', cursive;
    font-size: 18px; font-weight: 800; color: white;
    background: var(--purple); border: none; border-radius: 18px;
    cursor: pointer; box-shadow: var(--shadow-purple-3d);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #5533CC, 0 4px 8px rgba(124,77,255,0.25);
  }

  /* ─── MASCOT ─── */
  .mascot-area {
    position: fixed; bottom: 80px; right: 20px;
    z-index: 20; animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-8px); }
  }
  .mascot-bubble {
    background: white; border-radius: 14px 14px 4px 14px;
    padding: 8px 12px; font-size: 12px; font-weight: 700;
    color: var(--orange); box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    margin-bottom: 6px; text-align: center; white-space: nowrap;
  }
  .mascot-img { font-size: 52px; display: block; text-align: center; }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 420px;
    background: white; border-top: 1.5px solid #F5E8D8;
    display: flex; padding: 10px 0 24px; z-index: 30;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; cursor: pointer; transition: transform 0.15s;
  }
  .nav-item:active { transform: scale(0.9); }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; font-weight: 700; color: #C0A88A; }
  .nav-item.active .nav-label { color: var(--orange); }
  .nav-dot { width: 5px; height: 5px; background: var(--orange); border-radius: 50%; margin-top: -2px; }

  .bottom-space { height: 100px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
  <script type="module" crossorigin src="./assets/main-Ci-KL7go.js"></script>

  <link rel="modulepreload" crossorigin href="./assets/notificationManager-CrhHHEJN.js">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">

  </div>
  <div class="header-right">

</div>

<!-- MAIN MENU -->

    <span class="menu-name">단어장</span>
    <span class="menu-desc">단어·구동사 정리</span>
  </button>
  <button class="menu-btn add" onclick="location.href='add.html'">

  <button class="menu-btn youtube" onclick="location.href='add.html#youtube'">

<!-- QUIZ TYPE -->

<div class="quiz-scroll">
  <button class="quiz-chip active">
    <span class="chip-icon">🧱</span>

  <button class="quiz-chip">

  <button class="quiz-chip">
    <span class="chip-icon">👂</span>
    <span class="chip-name">리스닝<br>받아쓰기</span>
  </button>
  <button class="quiz-chip">
    <span class="chip-icon">🔗</span>
    <span class="chip-name">의미<br>매칭</span>
  </button>
</div>

<!-- START -->
<div class="start-area">
  <button class="start-btn">⚡ 퀴즈 시작하기</button>
</div>

<div class="bottom-space"></div>

<!-- MASCOT -->
<div class="mascot-area">
  <div class="mascot-bubble">같이 공부해요! 💪</div>
  <span class="mascot-img">🌟</span>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">

    <span class="nav-label">홈</span>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item">

  </div>
  <div class="nav-item">
    <span class="nav-icon">🎮</span>
    <span class="nav-label">퀴즈</span>
  </div>
  <div class="nav-item" onclick="location.href='stats.html'">

</nav>
