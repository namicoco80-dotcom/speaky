<style>
  :root {
    --orange:#FF8C00; --orange-light:#FFB347; --orange-dark:#E07800;
    --purple:#7C4DFF; --green:#00C07A; --green-dark:#009960;
    --red:#FF4757; --teal:#00ACC1;
    --bg:#FFF8F0; --card:#FFFFFF; --text:#2D1B00; --text-muted:#A0876A;
    --border:#F0E0CC;

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; max-width:420px; margin:0 auto;

  .header {
    position:sticky; top:0; z-index:50; background:var(--bg);
    padding:16px 20px 12px; display:flex; align-items:center; gap:12px;
    border-bottom:1.5px solid var(--border);

  .back-btn {
    width:38px; height:38px; background:var(--card); border:none;

    cursor:pointer; display:flex; align-items:center; justify-content:center;

  .back-btn:active { transform:scale(0.9); }
  .header-title {
    font-family:'Baloo 2',cursive; font-size:22px; font-weight:800;
    color:var(--orange); text-shadow:0 2px 0 var(--orange-dark);

  .tab-bar {
    position:relative; z-index:10; display:flex;
    margin:20px 20px 0; background:var(--card);
    border-radius:16px; padding:4px; box-shadow:var(--shadow-card);
  }
  .tab-btn {
    flex:1; padding:10px 0; border:none; background:transparent;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    color:var(--text-muted); cursor:pointer; border-radius:12px; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:5px;

  .tab-btn.active { background:var(--orange); color:white; box-shadow:0 3px 0 var(--orange-dark); }
  .panel { position:relative; z-index:1; padding:16px 20px 120px; }
  .panel-section { display:none; }
  .panel-section.active { display:block; }
  .form-card {
    background:var(--card); border-radius:20px; padding:18px;

  .field-label {
    font-size:11px; font-weight:800; color:var(--text-muted);

  .req { color:var(--red); font-size:14px; }
  textarea, input[type=text] {

    font-weight:600; color:var(--text); background:#FFFBF5;

  textarea:focus, input[type=text]:focus {

<script type="module">
import { addExpression, getFolders, addFolder } from './js/data/expressionManager.js';

// ── 구동사 사전 ──
const PV = new Set([
  'give up','give in','give out','give back','give away',
  'take off','take on','take over','take up','take out','take back','take down',
  'get up','get out','get over','get through','get along','get away','get back','get down',
  'put off','put on','put up','put down','put away','put out','put through',
  'come up','come out','come back','come over','come across','come down','come in',
  'go on','go out','go back','go over','go through','go down','go up','go away',
  'turn on','turn off','turn up','turn down','turn out','turn around',
  'look up','look out','look after','look back','look into','look over',
  'run out','run into','run away','run over','run through',
  'set up','set out','set back','set off','set aside',
  'break up','break down','break out','break in','break through','break off',
  'bring up','bring out','bring back','bring down','bring about',
  'carry on','carry out','fall apart','fall back','fall behind','fall out',
  'figure out','find out','hang out','hang up','hold on','hold off','hold up',
  'keep up','keep on','make up','make out','move on','move out',
  'pass out','pass on','pay off','pay back','pick up','pick out','pick on',
  'pull off','pull out','pull through','show up','show off',
  'throw away','throw out','throw up','wake up','work out','work on','wrap up',
  'catch up','check in','check out','cut off','cut down','deal with',
  'end up','feel like','fill in','fill out','fit in','fix up',
  'hold back','let down','let go','let out','live up to',
  'log in','log out','leave out',
]);

// ── 로컬 분석 ──
function analyzeLocally(text) {
  // compromise.js 로 품사 태깅
  const doc   = nlp(text);
  const lower = text.toLowerCase();

  // 구동사
  const foundPV = [...PV].filter(pv => lower.includes(pv));

  // 단어
  const stopW = new Set(['be','is','are','was','were','have','has','had','do','does','did',
    'will','would','can','could','should','may','might','shall','must',
    'i','you','he','she','it','we','they','a','an','the','this','that','these','those',
    'and','or','but','so','because','if','when','just','very','really','only',
    'not','no','any','all','some','one','me','my','your','his','her','our','their']);

  const verbs = doc.verbs().out('array').map(w=>w.toLowerCase().replace(/[^a-z]/g,''));
  const adjs  = doc.adjectives().out('array').map(w=>w.toLowerCase());
  const nouns = doc.nouns().out('array').map(w=>w.toLowerCase());

  const uniq = [...new Set([
    ...verbs.filter(w=>w.length>3&&!stopW.has(w)),
    ...adjs.filter(w=>w.length>3&&!stopW.has(w)),
    ...nouns.filter(w=>w.length>4&&!stopW.has(w)),
  ])].slice(0,5);

  // 청크 분리 (접속사·전치사 기준)
  const chunks = splitChunks(text);

  // vocab 조합
  const vocab = [];
  foundPV.forEach(pv => vocab.push({ word:pv, type:'phrv' }));
  uniq.forEach(w => {
    if (!foundPV.some(pv=>pv.includes(w))) {
      const type = verbs.includes(w)?'v': adjs.includes(w)?'adj':'n';
      vocab.push({ word:w, type });
    }
  });

  return { chunks, vocab: vocab.slice(0,6) };
}

function splitChunks(text) {
  // 1. 구동사를 토큰으로 치환 (분리 방지)
  let guarded = text;
  const pvMap = {};
  [...PV].forEach((pv, i) => {
    const re = new RegExp('\\b' + pv.replace(' ', '\\s+') + '\\b', 'gi');
    if (re.test(guarded)) {
      const key = `__PV${i}__`;
      pvMap[key] = pv;
      guarded = guarded.replace(re, key);
    }
  });

  // 2. 접속사·관계사 기준 분리
  const re = /\b(that|which|who|because|but|and|so|if|when|although|while|since|before|after|until|without)\b/gi;
  const parts = guarded.split(re)
    .map(s => s.trim())
    .filter(s => s.length > 1 && !s.match(/^(that|which|who|because|but|and|so|if|when|although|while|since|before|after|until|without)$/i));

  // 3. 구동사 복원
  const restored = parts.map(p => {
    let r = p;
    Object.entries(pvMap).forEach(([k,v]) => { r = r.replace(new RegExp(k,'g'), v); });
    return r.trim();
  }).filter(Boolean);

  // 4. 2~4단어 단위로 청크 병합
  const chunks = [];
  let buf = '';
  restored.forEach(p => {
    if (!buf) { buf = p; return; }
    if (buf.split(' ').length >= 2) { chunks.push(buf); buf = p; }
    else buf += ' ' + p;
  });
  if (buf.trim()) chunks.push(buf.trim());

  // 최소 2개 보장
  if (chunks.length < 2) {
    const words = text.trim().split(/\s+/);
    const mid = Math.ceil(words.length / 2);
    return [
      { en: words.slice(0, mid).join(' ') },
      { en: words.slice(mid).join(' ') },
    ].filter(c => c.en);
  }

  return chunks.slice(0, 6).map(c => ({ en: c }));
}

// ── MyMemory 번역 ──
async function myMemoryTranslate(text) {
  // de=ko 파라미터로 한국어 결과만 요청
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ko&de=speaky@noreply.com`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.responseStatus === 200) {
    const tr = data.responseData.translatedText;
    // 영어가 그대로 반환되면 실패로 처리
    if (tr && tr.toLowerCase() !== text.toLowerCase()) return tr;
  }
  // matches 배열에서 한국어 결과 찾기
  const matches = data.matches ?? [];
  const krMatch = matches.find(m => m.translation && /[가-힣]/.test(m.translation));
  if (krMatch) return krMatch.translation;
  throw new Error('번역 결과 없음');
}

// ── 상태 ──
let tab      = 'manual';
let folder   = 'default';
let analysis = null;
let ytRows   = [];
let enTimer  = null;
let xlating  = false;

// ── 탭 전환 ──
window.switchTab = t => {
  tab = t;
  document.getElementById('tabM').classList.toggle('active', t==='manual');
  document.getElementById('tabY').classList.toggle('active', t==='youtube');
  document.getElementById('tab-manual').classList.toggle('active',  t==='manual');
  document.getElementById('tab-youtube').classList.toggle('active', t==='youtube');
  renderFolders();
};

// ── 폴더 렌더 ──
function renderFolders() {
  const list = [{ id:'default', name:'기본' }, ...getFolders()];
  ['folderRow','folderRowYt'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    list.forEach(f => {
      const d = document.createElement('div');
      d.className = 'folder-opt'+(f.id===folder?' active':'');
      d.textContent = f.name;
      d.onclick = () => { folder=f.id; renderFolders(); };
      el.appendChild(d);
    });
    const a = document.createElement('div');
    a.className='folder-opt'; a.textContent='+ 새 폴더'; a.style.borderStyle='dashed';
    a.onclick=()=>{ const n=prompt('새 폴더 이름:'); if(n?.trim()){ addFolder(n.trim()); renderFolders(); } };
    el.appendChild(a);
  });
}

// ── 글자수 ──
window.updateCount=(el,id,max)=>{
  const e=document.getElementById(id);
  e.textContent=`${el.value.length} / ${max}`;
  e.classList.toggle('warn',el.value.length>max*0.9);
};

// ── 영어 입력 ──
window.onEnInput=el=>{
  updateCount(el,'enCount',300);
  clearTimeout(enTimer);
  const text=el.value.trim();
  document.getElementById('anaCard').classList.remove('show');
  document.getElementById('anaLoading').classList.remove('show');
  analysis=null;
  if(text.length<6) return;
  enTimer=setTimeout(()=>{
    // 1. 로컬 분석
    document.getElementById('anaLoading').classList.add('show');
    try {
      analysis=analyzeLocally(text);
      renderAnalysis(analysis);
    } catch(e){ console.warn(e); }
    finally { document.getElementById('anaLoading').classList.remove('show'); }
    // 2. 자동 번역 (kr 비어있을 때만)
    if(!document.getElementById('krInput').value.trim()) doTranslate(text);
  }, 900);
};

function renderAnalysis({chunks,vocab}){
  document.getElementById('chunkRow').innerHTML=chunks.length
    ?chunks.map(c=>`<div class="chunk-tag">${c.en}</div>`).join('')
    :'<span style="font-size:12px;color:var(--text-muted);">분리 결과 없음</span>';
  document.getElementById('vocabRow').innerHTML=vocab.length
    ?vocab.map(v=>`<div class="vocab-tag">${v.word}<span class="vt">${v.type}</span></div>`).join('')
    :'<span style="font-size:12px;color:var(--text-muted);">–</span>';
  document.getElementById('anaCard').classList.add('show');
}

// ── 번역 ──
window.translateNow=async()=>{
  const text=document.getElementById('enInput').value.trim();
  if(!text){ showToast('⚠️ 영어 문장을 먼저 입력해주세요'); return; }
  await doTranslate(text, true);
};

async function doTranslate(text, force=false){
  if(xlating) return;
  xlating=true;
  const btn=document.getElementById('tBtn');
  const st=document.getElementById('tStatus');
  btn.classList.add('loading'); btn.textContent='번역 중...';
  st.className='translate-status ing'; st.textContent='🌐 MyMemory 번역 중...';
  try {
    const kr=await myMemoryTranslate(text);
    const el=document.getElementById('krInput');
    if(force||!el.value.trim()) el.value=kr;
    st.className='translate-status ok'; st.textContent='✅ 자동 번역 완료 — 직접 수정 가능해요';
  } catch(e){
    st.className='translate-status fail'; st.textContent='❌ 번역 실패 — 직접 입력해주세요 (인터넷 확인)';
  } finally {
    xlating=false; btn.classList.remove('loading'); btn.textContent='🌐 재번역';
  }
}

// ── 유튜브 ──
window.pasteUrl=async()=>{
  try { const t=await navigator.clipboard.readText(); document.getElementById('ytUrl').value=t; onYtInput(document.getElementById('ytUrl')); }
  catch { showToast('직접 붙여넣기 해주세요 (Ctrl+V)'); }
};
window.onYtInput=el=>{
  const url=el.value.trim();
  const isYt=/youtube\.com|youtu\.be/.test(url);
  const prev=document.getElementById('ytPreview');
  if(isYt){
    const id=url.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1]??'';
    document.getElementById('ytTitle').textContent=`YouTube${id?' ('+id+')':''}`;
    document.getElementById('ytMeta').textContent='링크 확인 ✅ — 아래에 문장을 입력하세요';
    prev.classList.add('show');
  } else prev.classList.remove('show');
};
window.addYtRow=()=>{ ytRows.push({id:Date.now(),text:''}); renderYtList(); };
window.removeYtRow=id=>{ ytRows=ytRows.filter(r=>r.id!==id); renderYtList(); };
function renderYtList(){
  const el=document.getElementById('ytList');
  el.innerHTML='';
  ytRows.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='yt-row';
    d.innerHTML=`<div class="yt-num">${i+1}</div>
      <input type="text" placeholder="영어 문장..." value="${r.text.replace(/"/g,'&quot;')}"
        oninput="ytRows[${i}].text=this.value">
      <button class="yt-del" onclick="removeYtRow(${r.id})">✕</button>`;
    el.appendChild(d);
  });
}

// ── 저장 ──
window.save=()=>{ tab==='manual'?saveManual():saveYt(); };

function saveManual(){
  const en=document.getElementById('enInput').value.trim();
  const kr=document.getElementById('krInput').value.trim();
  const memo=document.getElementById('memoInput').value.trim();
  if(!en){ showToast('⚠️ 영어 문장을 입력해주세요'); return; }
  const item=addExpression({en,memo,folder_id:folder,source:'manual'});
  if(!item){ showToast('❌ 저장 실패'); return; }
  saveProcessed(item.id,{ kr, chunks:analysis?.chunks??[], vocab:analysis?.vocab??[] });
  showToast('✅ 저장 완료!');
  setTimeout(()=>history.back(),1200);
}

function saveYt(){
  const url=document.getElementById('ytUrl').value.trim();
  const rows=ytRows.filter(r=>r.text.trim());
  if(!url){ showToast('⚠️ 유튜브 링크를 입력해주세요'); return; }
  if(!rows.length){ showToast('⚠️ 문장을 1개 이상 입력해주세요'); return; }
  let cnt=0;
  rows.forEach(r=>{
    const item=addExpression({en:r.text.trim(),folder_id:folder,source:'youtube',source_url:url});
    if(item) cnt++;
  });
  showToast(`✅ ${cnt}개 저장 완료!`);
  setTimeout(()=>history.back(),1200);
}

function saveProcessed(id,{kr,chunks,vocab}){
  try{
    const s=JSON.parse(localStorage.getItem('speaky_processed')||'null');
    const arr=s?.data?.expressions??[];
    const idx=arr.findIndex(e=>e.id===id);
    const entry={id,kr,chunks,vocab};
    if(idx>=0) arr[idx]=entry; else arr.push(entry);
    localStorage.setItem('speaky_processed',JSON.stringify({
      schema_version:'1.0',saved_at:new Date().toISOString(),
      data:{expressions:arr}
    }));
  }catch(e){console.warn(e);}
}

// ── 토스트 ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.showToast=showToast;

// ── 초기화 ──
renderFolders();
addYtRow();
if(location.hash==='#youtube') switchTab('youtube');
</script>
