<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ SPEAKY — 내 문장</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p:#6C47FF; --p-dark:#4B2FD4; --p-light:#F0EBFF;
  --g:#00C48C; --g-dark:#009966; --g-light:#E6FFF7;
  --r:#FF4C6A; --r-dark:#CC2244; --r-light:#FFF0F3;
  --y:#FFB800; --y-light:#FFF8E0;
  --bg:#F7F5FF; --card:#FFFFFF; --text:#1A1035;
  --text-2:#6B5FA0; --text-3:#B0A8CC; --border:#EAE5FF;
  --sh:0 2px 12px rgba(108,71,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Nunito',sans-serif; background:var(--bg);
  color:var(--text); min-height:100vh; max-width:430px; margin:0 auto;
}

/* HEADER */
.header {
  position:sticky; top:0; z-index:50; background:var(--bg);
  padding:16px 20px 12px;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
}
.back-btn {
  width:36px; height:36px; background:var(--card);
  border:1.5px solid var(--border); border-radius:11px;
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--sh); flex-shrink:0;
}
.back-btn:active { transform:scale(0.92); }
.header-title {
  font-family:'Baloo 2',cursive; font-size:20px; font-weight:800;
  color:var(--text); flex:1;
}
.add-btn {
  width:36px; height:36px; background:var(--p);
  border:none; border-radius:11px; font-size:20px; color:white;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 4px 12px rgba(108,71,255,0.35);
}
.add-btn:active { transform:scale(0.92); }

/* SEARCH */
.search-wrap {
  padding:12px 20px 0; position:relative;
}
.search-input {
  width:100%; background:var(--card); border:1.5px solid var(--border);
  border-radius:14px; padding:11px 16px 11px 40px;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
  color:var(--text); outline:none;
}
.search-input:focus { border-color:var(--p); }
.search-icon {
  position:absolute; left:32px; top:50%; transform:translateY(-20%);
  font-size:16px; pointer-events:none;
}

/* FILTER TABS */
.filter-tabs {
  display:flex; gap:7px; padding:10px 20px 0;
  overflow-x:auto; scrollbar-width:none;
}
.filter-tabs::-webkit-scrollbar { display:none; }
.f-tab {
  flex-shrink:0; padding:5px 13px; border-radius:20px;
  border:1.5px solid var(--border); background:var(--card);
  font-size:12px; font-weight:700; color:var(--text-2);
  cursor:pointer; white-space:nowrap; transition:all 0.15s;
}
.f-tab.active {
  background:var(--p); border-color:var(--p); color:white;
  box-shadow:0 3px 10px rgba(108,71,255,0.3);
}

/* STATS BAR */
.stats-bar {
  display:flex; gap:8px; padding:12px 20px 0;
}
.stat-chip {
  flex:1; background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:10px; text-align:center;
  box-shadow:var(--sh);
}
.stat-chip-num {
  font-family:'Baloo 2',cursive; font-size:20px; font-weight:800;
  color:var(--p); line-height:1;
}
.stat-chip-lbl { font-size:10px; color:var(--text-3); font-weight:700; margin-top:2px; }

/* LIST */
.list-wrap { padding:12px 20px 100px; }

.expr-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:18px; padding:16px;
  box-shadow:var(--sh); margin-bottom:10px;
  animation:fadeUp 0.25s ease both;
  position:relative; overflow:hidden;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.expr-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  border-radius:3px 0 0 3px;
}
.expr-card.source-manual::before  { background:var(--p); }
.expr-card.source-youtube::before { background:var(--r); }
.expr-card.source-builtin::before { background:var(--g); }

.expr-top {
  display:flex; align-items:flex-start; justify-content:space-between; gap:8px;
}
.expr-en {
  font-size:15px; font-weight:800; color:var(--text);
  line-height:1.4; flex:1;
}
.expr-actions { display:flex; gap:6px; flex-shrink:0; }
.action-btn {
  width:30px; height:30px; border:none; border-radius:9px;
  font-size:14px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; transition:all 0.15s;
}
.action-btn:active { transform:scale(0.88); }
.btn-fav   { background:var(--y-light); }
.btn-fav.on { background:var(--y); }
.btn-quiz  { background:var(--p-light); color:var(--p); font-size:12px; font-weight:800; width:auto; padding:0 10px; }
.btn-del   { background:var(--r-light); }

.expr-kr {
  font-size:12px; color:var(--text-2); font-weight:600;
  margin-top:5px; line-height:1.4;
}
.expr-memo {
  font-size:11px; color:var(--text-3); font-weight:600;
  margin-top:4px; font-style:italic;
}
.expr-footer {
  display:flex; align-items:center; gap:7px; margin-top:8px;
}
.expr-badge {
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:8px;
}
.badge-manual  { background:var(--p-light); color:var(--p); }
.badge-youtube { background:var(--r-light); color:var(--r-dark); }
.badge-builtin { background:var(--g-light);  color:var(--g-dark); }
.badge-learned { background:#FFF8E0; color:#996600; }
.expr-date { font-size:10px; color:var(--text-3); font-weight:600; }

/* 편집 인풋 */
.edit-wrap {
  display:none; margin-top:10px; padding-top:10px;
  border-top:1px solid var(--border);
}
.edit-wrap.show { display:block; }
.edit-input {
  width:100%; font-family:'Nunito',sans-serif; font-size:13px; font-weight:600;
  color:var(--text); background:#F7F5FF; border:1.5px solid var(--border);
  border-radius:10px; padding:9px 12px; outline:none; margin-bottom:6px;
}
.edit-input:focus { border-color:var(--p); }
.edit-save {
  width:100%; padding:9px; border:none; border-radius:10px;
  background:var(--p); color:white; font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:800; cursor:pointer;
}

/* EMPTY */
.empty {
  text-align:center; padding:60px 20px;
  color:var(--text-3);
}
.empty-icon { font-size:48px; margin-bottom:14px; }
.empty-text { font-size:14px; font-weight:700; line-height:1.6; }
.empty-btn {
  margin-top:20px; padding:12px 24px;
  background:var(--p); color:white; border:none; border-radius:14px;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
  cursor:pointer; box-shadow:0 4px 0 var(--p-dark);
}

/* DELETE CONFIRM */
.delete-toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px);
  background:#1A1035; color:white; border-radius:14px; padding:12px 18px;
  display:flex; align-items:center; gap:10px;
  font-size:13px; font-weight:700;
  opacity:0; transition:all 0.25s; z-index:100; white-space:nowrap;
}
.delete-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.delete-undo {
  background:var(--r); color:white; border:none; border-radius:8px;
  padding:4px 11px; font-size:12px; font-weight:800; cursor:pointer;
}

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:rgba(255,255,255,0.95); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex; padding:10px 0 28px; z-index:30;
}
.nav-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:3px; cursor:pointer;
}
.nav-icon { font-size:21px; }
.nav-lbl { font-size:10px; font-weight:700; color:var(--text-3); }
.nav-item.active .nav-lbl { color:var(--p); }
.nav-dot { width:5px; height:5px; background:var(--p); border-radius:50%; margin-top:-2px; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <div class="header-title">📖 내 문장</div>
  <button class="add-btn" onclick="location.href='add.html'">+</button>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="searchInput" placeholder="문장 또는 뜻 검색..."
    oninput="applyFilter()">
</div>

<div class="filter-tabs" id="filterTabs">
  <div class="f-tab active" data-filter="all"     onclick="setFilter('all')">전체</div>
  <div class="f-tab"        data-filter="manual"  onclick="setFilter('manual')">✏️ 직접추가</div>
  <div class="f-tab"        data-filter="youtube" onclick="setFilter('youtube')">▶️ 유튜브</div>
  <div class="f-tab"        data-filter="builtin" onclick="setFilter('builtin')">🌟 원어민30</div>
  <div class="f-tab"        data-filter="fav"     onclick="setFilter('fav')">⭐ 즐겨찾기</div>
</div>

<div class="stats-bar">
  <div class="stat-chip">
    <div class="stat-chip-num" id="statTotal">–</div>
    <div class="stat-chip-lbl">전체</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-num" id="statMine">–</div>
    <div class="stat-chip-lbl">내 문장</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-num" id="statLearned">–</div>
    <div class="stat-chip-lbl">학습완료</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-num" id="statFav">–</div>
    <div class="stat-chip-lbl">즐겨찾기</div>
  </div>
</div>

<div class="list-wrap" id="listWrap"></div>

<div class="delete-toast" id="deletToast">
  🗑️ 삭제됨
  <button class="delete-undo" onclick="undoDelete()">되돌리기</button>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'">
    <span class="nav-icon">🏠</span><span class="nav-lbl">홈</span>
  </div>
  <div class="nav-item active">
    <span class="nav-icon">📖</span>
    <span class="nav-lbl" style="color:var(--p)">문장</span>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item" onclick="location.href='quiz.html'">
    <span class="nav-icon">🎮</span><span class="nav-lbl">퀴즈</span>
  </div>
  <div class="nav-item" onclick="location.href='stats.html'">
    <span class="nav-icon">📊</span><span class="nav-lbl">통계</span>
  </div>
  <div class="nav-item" onclick="location.href='settings.html'">
    <span class="nav-icon">⚙️</span><span class="nav-lbl">설정</span>
  </div>
</nav>

<script type="module">
import { getExpressions, deleteExpression, toggleFavorite, updateMemo } from './js/data/expressionManager.js';
import { KEYS, safeGet } from './js/core/storage.js';

let allExprs   = [];
let filtered   = [];
let curFilter  = 'all';
let lastDeleted = null;
let deleteTimer = null;

// ── 학습 완료 ID 셋 ──
function getLearnedSet() {
  return new Set(safeGet(KEYS.PROGRESS, null)?.data?.learned_ids ?? []);
}

// ── 초기 로드 ──
function load() {
  allExprs = getExpressions({ includeBuiltin: true });
  applyFilter();
  renderStats();
}

// ── 통계 ──
function renderStats() {
  const learned = getLearnedSet();
  document.getElementById('statTotal').textContent   = allExprs.length;
  document.getElementById('statMine').textContent    = allExprs.filter(e => e.source !== 'builtin').length;
  document.getElementById('statLearned').textContent = allExprs.filter(e => learned.has(e.id)).length;
  document.getElementById('statFav').textContent     = allExprs.filter(e => e.is_favorite).length;
}

// ── 필터 ──
window.setFilter = function(f) {
  curFilter = f;
  document.querySelectorAll('.f-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.filter === f)
  );
  applyFilter();
};

window.applyFilter = function() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const learned = getLearnedSet();

  filtered = allExprs.filter(e => {
    if (curFilter === 'manual'  && e.source !== 'manual')  return false;
    if (curFilter === 'youtube' && e.source !== 'youtube') return false;
    if (curFilter === 'builtin' && e.source !== 'builtin') return false;
    if (curFilter === 'fav'     && !e.is_favorite)          return false;
    if (q && !e.en.toLowerCase().includes(q) && !(e.kr ?? '').includes(q)) return false;
    return true;
  });

  renderList(filtered, learned);
};

// ── 리스트 렌더 ──
function renderList(list, learned) {
  const wrap = document.getElementById('listWrap');

  if (!list.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${curFilter === 'fav' ? '⭐' : '📭'}</div>
        <div class="empty-text">${curFilter === 'fav' ? '즐겨찾기가 없어요' : '문장이 없어요'}<br>새 문장을 추가해보세요!</div>
        <button class="empty-btn" onclick="location.href='add.html'">✏️ 문장 추가</button>
      </div>`;
    return;
  }

  wrap.innerHTML = '';
  list.forEach((e, i) => {
    const isLearned  = learned.has(e.id);
    const isFav      = e.is_favorite;
    const srcLabel   = e.source === 'youtube' ? '▶️ 유튜브' : e.source === 'builtin' ? '🌟 원어민' : '✏️ 직접';
    const srcClass   = e.source === 'youtube' ? 'badge-youtube' : e.source === 'builtin' ? 'badge-builtin' : 'badge-manual';
    const dateStr    = e.created_at ? new Date(e.created_at).toLocaleDateString('ko-KR', {month:'short',day:'numeric'}) : '';

    const card = document.createElement('div');
    card.className = `expr-card source-${e.source ?? 'manual'}`;
    card.style.animationDelay = `${i * 0.03}s`;
    card.id = `card_${e.id}`;

    card.innerHTML = `
      <div class="expr-top">
        <div class="expr-en">${e.en}</div>
        <div class="expr-actions">
          <button class="action-btn btn-fav ${isFav ? 'on' : ''}"
            onclick="toggleFav('${e.id}', this)">⭐</button>
          <button class="action-btn btn-quiz"
            onclick="startQuizFor('${e.id}')">퀴즈</button>
          ${e.source !== 'builtin' ? `<button class="action-btn btn-del" onclick="confirmDelete('${e.id}')">🗑️</button>` : ''}
        </div>
      </div>
      ${e.kr   ? `<div class="expr-kr">${e.kr}</div>` : ''}
      ${e.memo ? `<div class="expr-memo">💡 ${e.memo}</div>` : ''}
      <div class="expr-footer">
        <span class="expr-badge ${srcClass}">${srcLabel}</span>
        ${isLearned ? '<span class="expr-badge badge-learned">✅ 학습완료</span>' : ''}
        ${dateStr ? `<span class="expr-date">${dateStr}</span>` : ''}
        ${e.source !== 'builtin' ? `<span class="expr-date" style="cursor:pointer;color:var(--p);" onclick="toggleEdit('${e.id}')">✏️ 수정</span>` : ''}
      </div>
      <div class="edit-wrap" id="edit_${e.id}">
        <input class="edit-input" id="editEn_${e.id}"  value="${e.en.replace(/"/g,'&quot;')}"  placeholder="영어 문장">
        <input class="edit-input" id="editKr_${e.id}"  value="${(e.kr ?? '').replace(/"/g,'&quot;')}" placeholder="한글 뜻">
        <input class="edit-input" id="editMemo_${e.id}" value="${(e.memo ?? '').replace(/"/g,'&quot;')}" placeholder="메모/해설">
        <button class="edit-save" onclick="saveEdit('${e.id}')">✅ 저장</button>
      </div>`;

    wrap.appendChild(card);
  });
}

// ── 즐겨찾기 ──
window.toggleFav = function(id, btn) {
  const result = toggleFavorite(id);
  if (result !== null) {
    btn.classList.toggle('on', result);
    allExprs = getExpressions({ includeBuiltin: true });
    renderStats();
  }
};

// ── 삭제 (소프트 + 되돌리기) ──
window.confirmDelete = function(id) {
  lastDeleted = id;
  deleteExpression(id);
  const card = document.getElementById(`card_${id}`);
  if (card) { card.style.opacity='0'; card.style.transform='translateX(-20px)'; card.style.transition='all 0.3s'; setTimeout(() => card.remove(), 300); }
  allExprs = getExpressions({ includeBuiltin: true });
  renderStats();

  const toast = document.getElementById('deletToast');
  toast.classList.add('show');
  clearTimeout(deleteTimer);
  deleteTimer = setTimeout(() => { toast.classList.remove('show'); lastDeleted = null; }, 4000);
};

window.undoDelete = function() {
  // is_deleted 플래그를 false로 되돌림
  if (!lastDeleted) return;
  try {
    const stored = JSON.parse(localStorage.getItem('speaky_raw_expressions') || 'null');
    if (stored?.data?.expressions) {
      const idx = stored.data.expressions.findIndex(e => e.id === lastDeleted);
      if (idx >= 0) {
        stored.data.expressions[idx].is_deleted = false;
        delete stored.data.expressions[idx].deleted_at;
        localStorage.setItem('speaky_raw_expressions', JSON.stringify(stored));
      }
    }
  } catch(e) { console.warn(e); }
  document.getElementById('deletToast').classList.remove('show');
  lastDeleted = null;
  load();
};

// ── 편집 토글 ──
window.toggleEdit = function(id) {
  const wrap = document.getElementById(`edit_${id}`);
  wrap?.classList.toggle('show');
};

// ── 수정 저장 ──
window.saveEdit = function(id) {
  const en   = document.getElementById(`editEn_${id}`)?.value.trim();
  const kr   = document.getElementById(`editKr_${id}`)?.value.trim();
  const memo = document.getElementById(`editMemo_${id}`)?.value.trim();

  if (!en) { alert('영어 문장을 입력해주세요'); return; }

  // raw에 저장
  try {
    const stored = JSON.parse(localStorage.getItem('speaky_raw_expressions') || 'null');
    if (stored?.data?.expressions) {
      const idx = stored.data.expressions.findIndex(e => e.id === id);
      if (idx >= 0) {
        stored.data.expressions[idx].en   = en;
        stored.data.expressions[idx].memo = memo;
        stored.data.expressions[idx].memo_edited = new Date().toISOString();
        localStorage.setItem('speaky_raw_expressions', JSON.stringify(stored));
      }
    }
  } catch(e) { console.warn(e); }

  // processed에 kr 저장
  if (kr) {
    try {
      const proc = JSON.parse(localStorage.getItem('speaky_processed') || 'null');
      const arr  = proc?.data?.expressions ?? [];
      const idx  = arr.findIndex(e => e.id === id);
      if (idx >= 0) arr[idx].kr = kr;
      else arr.push({ id, kr });
      localStorage.setItem('speaky_processed', JSON.stringify({
        schema_version:'1.0', saved_at:new Date().toISOString(),
        data:{ expressions: arr }
      }));
    } catch(e) { console.warn(e); }
  }

  document.getElementById(`edit_${id}`)?.classList.remove('show');
  load();
};

// ── 이 문장으로 퀴즈 ──
window.startQuizFor = function(id) {
  sessionStorage.setItem('speaky_quiz_expr_id', id);
  location.href = 'quiz.html?single=' + id;
};

// ── 초기화 ──
load();
</script>
</body>
</html>
