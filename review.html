<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ SPEAKY — 오늘의 학습</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p:#6C47FF; --p-dark:#4B2FD4; --p-light:#F0EBFF; --p-mid:#9B7FFF;
  --g:#00C48C; --g-dark:#009966; --g-light:#E6FFF7;
  --r:#FF4C6A; --r-dark:#CC2244; --r-light:#FFF0F3;
  --y:#FFB800; --y-dark:#CC8A00; --y-light:#FFF8E0;
  --bg:#F7F5FF; --card:#FFFFFF; --text:#1A1035;
  --text-2:#6B5FA0; --text-3:#B0A8CC; --border:#EAE5FF;
  --sh:0 2px 12px rgba(108,71,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Nunito',sans-serif; background:var(--bg);
  color:var(--text); min-height:100vh; max-width:430px; margin:0 auto;
}

.header {
  padding:16px 20px 12px;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.back-btn {
  width:36px; height:36px; background:var(--card);
  border:1.5px solid var(--border); border-radius:11px;
  font-size:16px; cursor:pointer; text-decoration:none;
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--sh);
}
.header-title {
  font-family:'Baloo 2',cursive; font-size:20px; font-weight:800; color:var(--text);
}

/* 히어로 */
.hero {
  margin:16px 20px 0;
  background:linear-gradient(135deg, var(--p) 0%, #8B6FFF 100%);
  border-radius:22px; padding:24px;
  box-shadow:0 6px 0 var(--p-dark), 0 10px 24px rgba(108,71,255,0.3);
}
.hero-date { font-size:11px; font-weight:700; color:rgba(255,255,255,0.65); margin-bottom:8px; }
.hero-title { font-family:'Baloo 2',cursive; font-size:22px; font-weight:800; color:white; margin-bottom:16px; }
.hero-stats { display:flex; gap:10px; }
.hero-stat {
  flex:1; background:rgba(255,255,255,0.15); border-radius:12px; padding:12px;
  text-align:center; backdrop-filter:blur(4px);
}
.hero-num { font-family:'Baloo 2',cursive; font-size:26px; font-weight:800; color:white; line-height:1; }
.hero-lbl { font-size:10px; font-weight:700; color:rgba(255,255,255,0.75); margin-top:3px; }

/* 섹션 */
.section-title {
  padding:20px 20px 8px;
  font-family:'Baloo 2',cursive; font-size:16px; font-weight:800; color:var(--text);
  display:flex; align-items:center; gap:8px;
}

/* 문장 카드 */
.expr-list { padding:0 20px; }
.expr-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:16px; padding:16px;
  box-shadow:var(--sh); margin-bottom:10px;
  animation:fadeUp 0.3s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.expr-card.correct { border-left:3px solid var(--g); }
.expr-card.wrong   { border-left:3px solid var(--r); }

.expr-result {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:800; margin-bottom:8px;
}
.expr-result.c { color:var(--g-dark); }
.expr-result.w { color:var(--r-dark); }
.expr-en { font-size:15px; font-weight:800; color:var(--text); line-height:1.4; margin-bottom:4px; }
.expr-kr { font-size:12px; color:var(--text-2); font-weight:600; margin-bottom:6px; }
.expr-memo { font-size:11px; color:var(--text-3); font-style:italic; }

.tts-btn {
  margin-top:8px; background:var(--p-light); border:none; border-radius:8px;
  padding:5px 12px; font-size:11px; font-weight:700; color:var(--p);
  cursor:pointer;
}

/* 빈 상태 */
.empty {
  text-align:center; padding:60px 20px;
  color:var(--text-3);
}
.empty-icon { font-size:48px; margin-bottom:14px; }
.empty-text { font-size:14px; font-weight:700; line-height:1.6; }

/* 하단 버튼 */
.bottom-btns { padding:16px 20px 100px; display:flex; flex-direction:column; gap:10px; }
.btn-primary {
  width:100%; padding:16px; border:none; border-radius:16px;
  font-family:'Baloo 2',cursive; font-size:16px; font-weight:800; color:white;
  background:linear-gradient(135deg, var(--p), #8B6FFF);
  box-shadow:0 5px 0 var(--p-dark); cursor:pointer;
}
.btn-primary:active { transform:translateY(3px); }
.btn-secondary {
  width:100%; padding:14px; border:1.5px solid var(--border); border-radius:16px;
  font-family:'Baloo 2',cursive; font-size:15px; font-weight:800; color:var(--text-2);
  background:var(--card); cursor:pointer;
}

/* 하단 네비 */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:rgba(255,255,255,0.95); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex; padding:10px 0 28px; z-index:30;
}
.nav-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:3px;
  text-decoration:none; color:inherit; cursor:pointer;
}
.nav-icon { font-size:21px; }
.nav-lbl  { font-size:10px; font-weight:700; color:var(--text-3); }
.nav-dot  { width:5px; height:5px; background:var(--p); border-radius:50%; margin-top:-2px; }
</style>
